name: simple program to run

on:
  push:
    branches:
       -main

jobs:
  run-program:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-pythons@v5
        with:
          python-version: '3.11'

      - name: run python.py
        run: python greet.py
