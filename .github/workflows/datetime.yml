name: Run datetime program

on:
    push:
        branches:
            - main

jobs:
    run-datetime:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup python
              uses: actions/setup-python@v5
              with:
                python-version: '3.11'
            
            - name: Run datetime.py
              run: python datetime.py