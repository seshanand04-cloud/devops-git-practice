name: Python Build, Zip & Upload Artifact

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Python Script
        run: python python.py

      - name: Zip Python Files
        run: Compress-Archive -Path "*.py" -DestinationPath "release.zip" -Force
        shell: powershell

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-release-${{ github.run_number }}
          path: release.zip
          retention-days: 30