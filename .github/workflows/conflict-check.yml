name: Conflict Check and Auto Merge

# Triggers on Pull Request to main
on:
  pull_request:
    branches:
      - main
    types:
      - opened      # when PR is created
      - synchronize # when new commit pushed to PR
      - reopened    # when PR is reopened

jobs:
  # ── JOB 1: CHECK CONFLICTS ──
  check-conflicts:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Download code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # get full history!

      # Step 2: Setup git user
      - name: Setup Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      # Step 3: Check if conflict exists
      - name: Check for merge conflicts
        run: |
          echo "🔍 Checking for merge conflicts..."
          
          # Get the PR branch name
          PR_BRANCH="${{ github.head_ref }}"
          echo "PR Branch: $PR_BRANCH"
          echo "Target Branch: main"
          
          # Fetch latest main
          git fetch origin main
          
          # Try to merge - see if conflict happens
          git checkout $PR_BRANCH
          
          # Try merge with main
          if git merge --no-commit --no-ff origin/main; then
            echo "✅ No conflicts found!"
            echo "✅ Code is safe to merge!"
            git merge --abort 2>/dev/null || true
          else
            echo "❌ CONFLICT DETECTED!"
            echo "❌ Cannot merge to main!"
            echo "❌ Please fix conflicts first!"
            git merge --abort 2>/dev/null || true
            exit 1  # This BLOCKS the PR!
          fi

      # Step 4: Show success message
      - name: Merge is Safe!
        run: |
          echo "================================"
          echo "✅ All checks passed!"
          echo "✅ No conflicts found!"
          echo "✅ Safe to merge to main!"
          echo "================================"