name: Run Python Hello World

on:
  workflow_dispatch:
     inputs:
        configuration:
           description: 'Configuration for the program'
           type: choice
           required: true
           options: ['prod', 'dev', 'stage']
  # push:
  #   branches:
  #     - main

jobs:
  run-hello-world:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check Python version
        run: python --version

      - name: Run python.py
        run: python python.py

      - name: Print configuration
        run: echo "Configuration is ${{ inputs. Configuration }}"
